<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manual OTP Input</title>
</head>
<body>
  <h2>Masukkan OTP</h2>
  <form id="otpForm">
    <input type="text" id="otp" maxlength="6" placeholder="123456" />
    <button type="submit">Submit</button>
  </form>
  <script>
    document.getElementById('otpForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const otp = document.getElementById('otp').value;
      // simpan OTP ke localStorage agar bisa diambil Cypress
      localStorage.setItem('manualOtp', otp);
      alert('OTP tersimpan: ' + otp);
    });
  </script>
</body>
</html>
